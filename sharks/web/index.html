<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sharks Dashboard</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Sharks — Student Engagement Dashboard</h1>
        <p>WhatsApp-first demo console for mentor, recommendations, ROI, and loan APIs.</p>
        <div class="status-bar">
          <span id="statusIndicator" class="status-dot loading"></span>
          <span id="statusText">Checking API...</span>
        </div>
      </header>

      <section class="card">
        <div class="card-header">
          <h2>Quick Health Check</h2>
          <button id="demoBtn" class="demo-btn">📊 Load Demo Data</button>
        </div>
        <button id="healthBtn">Check API Health</button>
      </section>

      <section class="card">
        <h2>Create / Update Profile</h2>
        <form id="profileForm">
          <input name="whatsapp_id" placeholder="WhatsApp ID (10+ digits)" required />
          <input name="name" placeholder="Name" />
          <input name="email" placeholder="Email" />
          <input name="marks" type="number" step="0.1" placeholder="Marks" />
          <input name="budget" type="number" step="0.1" placeholder="Budget" />
          <input name="target_country" placeholder="Target Country" />
          <input name="target_course" placeholder="Target Course" />
          <input name="work_experience" type="number" step="0.1" placeholder="Work Experience (years)" />
          <input name="family_income" type="number" step="0.1" placeholder="Family Income" />
          <button type="submit">Save Profile</button>
        </form>
      </section>

      <section class="card">
        <h2>Mentor Chat</h2>
        <form id="mentorForm">
          <input name="whatsapp_id" placeholder="WhatsApp ID" required />
          <input name="message" placeholder="Ask anything" required />
          <button type="submit">Ask Mentor</button>
        </form>
      </section>

      <section class="card">
        <h2>ROI Calculator</h2>
        <form id="roiForm">
          <input name="course" placeholder="Course" required />
          <input name="country" placeholder="Country" required />
          <input name="tuition_cost" type="number" step="0.1" placeholder="Tuition Cost" required />
          <input name="living_cost_per_year" type="number" step="0.1" placeholder="Living Cost / Year" required />
          <input name="duration_years" type="number" step="0.1" placeholder="Duration Years" required />
          <button type="submit">Calculate ROI</button>
        </form>
      </section>

      <section class="card">
        <h2>Loan Eligibility</h2>
        <form id="loanForm">
          <input name="whatsapp_id" placeholder="WhatsApp ID" required />
          <input name="marks" type="number" step="0.1" placeholder="Marks" required />
          <input name="family_income" type="number" step="0.1" placeholder="Family Income" required />
          <input name="budget" type="number" step="0.1" placeholder="Budget" required />
          <input name="target_country" placeholder="Target Country" />
          <input name="target_course" placeholder="Target Course" />
          <button type="submit">Check Eligibility</button>
        </form>
      </section>

      <section class="card">
        <h2>WhatsApp Manual Send</h2>
        <form id="waSendForm">
          <input name="to" placeholder="Recipient WhatsApp Number (countrycode+number)" required />
          <input name="text" placeholder="Message" required />
          <button type="submit">Send WhatsApp Message</button>
        </form>
      </section>

      <section class="card">
        <h2>OCR (Dummy for now)</h2>
        <form id="docForm">
          <input name="whatsapp_id" placeholder="WhatsApp ID" required />
          <input name="document_type" placeholder="PAN / admit_letter / income_proof" required />
          <textarea name="raw_text" rows="4" placeholder="Paste extracted text or leave empty for dummy"></textarea>
          <button type="submit">Process Document</button>
        </form>
      </section>

      <section class="card">
        <h2>Response <span id="responseStatus"></span></h2>
        <pre id="output" class="response-output">Ready.</pre>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
